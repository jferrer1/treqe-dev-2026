<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>TREQE — Prototipo Navegable</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #1A1A1A; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

    .phone {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      margin: 0 auto;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    @media (min-width: 430px) {
      .phone { height: 844px; margin: 20px auto; border-radius: 44px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
      body { display: flex; align-items: center; justify-content: center; }
    }

    iframe {
      width: 100%;
      height: calc(100% - 50px);
      border: none;
      display: block;
      background: #F8F6F0;
    }

    /* Loading */
    .loader {
      position: absolute; top: 0; left: 0; right: 0; bottom: 50px;
      display: flex; align-items: center; justify-content: center;
      background: #F8F6F0; z-index: 5; transition: opacity 0.3s;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }
    .loader .spinner { width: 32px; height: 32px; border: 3px solid #E8E4DC; border-top-color: #FF6A35; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Floating nav button */
    .nav-float {
      position: absolute; top: 8px; right: 8px; z-index: 20;
      display: flex; gap: 6px;
    }
    .nav-float button {
      font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600;
      padding: 7px 14px; border-radius: 20px; border: none; cursor: pointer;
      background: rgba(0,0,0,0.75); color: #FFF; backdrop-filter: blur(8px);
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .nav-float button:active { transform: scale(0.93); opacity: 0.8; }
    .nav-float .next-btn { background: #FF6A35; }
    .nav-float .home-btn { }

    /* Bottom bar */
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
      background: #FFF; border-top: 1px solid #E8E4DC;
      display: flex; align-items: center; padding: 0 12px; z-index: 10;
    }
    .bottom-bar .screen-name {
      font-size: 0.75rem; font-weight: 500; color: #B0B0B0;
      text-align: center; flex: 1;
    }
    .bottom-bar .screen-name strong { color: #666; }
    .bottom-btn {
      font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 500;
      padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer;
      background: none; color: #888; transition: all 0.15s;
      display: flex; align-items: center; gap: 4px;
    }
    .bottom-btn:active { background: #F0EDE6; color: #555; }
    .bottom-btn i { font-size: 0.9rem; }
    .bottom-btn-home { min-width: 36px; justify-content: center; }

    @media (min-width: 430px) {
      .bottom-bar { border-radius: 0 0 44px 44px; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="loader" id="loader"><div class="spinner"></div></div>

    <!-- Floating nav -->
    <div class="nav-float" id="navFloat">
      <button class="home-btn" onclick="navHome()">🏠</button>
      <button class="next-btn" id="nextBtn" onclick="navNext()">Siguiente →</button>
    </div>

    <!-- Screen iframe -->
    <iframe id="screenFrame" src="../v9-splash/" onload="onFrameLoad()"></iframe>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <button class="bottom-btn" onclick="navBack()"><i class="fas fa-chevron-left"></i> Volver</button>
      <div class="screen-name" id="screenName">Splash <strong id="screenIdDisplay">splash</strong></div>
      <button class="bottom-btn bottom-btn-home" onclick="navHome()"><i class="fas fa-home"></i></button>
    </div>
  </div>

  <script>
    var SCREENS = {
      'splash':       { path: '../v9-splash/',           name: 'Splash',         next: 'onboarding', timer: 3500 },
      'onboarding':   { path: '../v5-onboarding/',        name: 'Onboarding',     next: 'registro',   timer: 0 },
      'registro':     { path: '../v10-registro/',         name: 'Registro',       next: 'catalogo',   timer: 0 },
      'catalogo':     { path: '../v1-catalogo/',          name: 'Catálogo',       next: 'detalle',    timer: 0 },
      'detalle':      { path: '../v2-detalle/',           name: 'Detalle',        next: 'match',      timer: 0 },
      'match':        { path: '../v6-match-notification/',name: 'Match!',         next: 'seguimiento',timer: 0 },
      'seguimiento':  { path: '../v7-seguimiento/',       name: 'Seguimiento',    next: 'catalogo',   timer: 0 },
      'subir':        { path: '../v3-subir/',             name: 'Subir artículo', next: 'catalogo',   timer: 0 },
      'perfil':       { path: '../v4-perfil/',            name: 'Mi perfil',      next: 'ajustes',    timer: 0 },
      'ajustes':      { path: '../v8-ajustes/',           name: 'Ajustes',        next: 'catalogo',   timer: 0 },
    };

    var currentScreen = 'splash';
    var frame = document.getElementById('screenFrame');
    var loader = document.getElementById('loader');
    var autoTimer = null;
    var navHistory = ['splash'];

    function goTo(screenId, addHist) {
      var screen = SCREENS[screenId];
      if (!screen) return;

      if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }

      currentScreen = screenId;
      if (addHist !== false) { navHistory.push(screenId); }

      loader.classList.remove('hidden');
      frame.src = screen.path;

      document.getElementById('screenName').innerHTML = screen.name + ' <strong id="screenIdDisplay">' + screenId + '</strong>';
      document.getElementById('nextBtn').textContent = '→ ' + (screen.next ? SCREENS[screen.next].name : 'Inicio');

      if (screen.timer > 0) {
        autoTimer = setTimeout(function() { goTo(screen.next); }, screen.timer);
      }
    }

    function onFrameLoad() {
      loader.classList.add('hidden');
      // Inject nav bridge into iframe after it loads
      try {
        injectClickBridge(frame.contentDocument || frame.contentWindow.document);
      } catch(e) {
        // Cross-origin - just use parent nav buttons
      }
    }

    function injectClickBridge(doc) {
      // Map: current screen -> rules for which buttons go where
      var rules = {
        'registro': [
          { sel: '.submit-btn, .skip-link, .social-btn, .auth-footer a, [onclick*="Inicia"]', target: 'catalogo' },
        ],
        'catalogo': [
          { sel: '.card, [class*="product"], [class*="item"], [onclick*="alert"]', target: 'detalle', exclude: '[class*="cat"]' },
          { sel: '[onclick*="perfil"], [onclick*="profile"]', target: 'perfil' },
          { sel: '[onclick*="subir"], [onclick*="upload"], [onclick*="add"]', target: 'subir' },
        ],
        'detalle': [
          { sel: '[onclick*="trade"], [onclick*="offer"], [onclick*="intercambio"], [onclick*="proponer"]', target: 'match' },
        ],
        'match': [
          { sel: '[onclick*="accept"], [onclick*="aceptar"], .primary-btn', target: 'seguimiento' },
          { sel: '[onclick*="close"], [onclick*="reject"], [onclick*="rechazar"], [onclick*="hide"]', target: 'catalogo' },
        ],
        'subir': [
          { sel: '.submit-btn, [onclick*="publicar"], [onclick*="publish"]', target: 'catalogo' },
        ],
        'perfil': [
          { sel: '[onclick*="ajustes"], [onclick*="settings"]', target: 'ajustes' },
        ],
      };

      var screenRules = rules[currentScreen];
      if (!screenRules) return;

      screenRules.forEach(function(rule) {
        var els = doc.querySelectorAll(rule.sel);
        els.forEach(function(el) {
          // Skip excluded elements
          if (rule.exclude && el.matches(rule.exclude)) return;
          el.style.cursor = 'pointer';
          el.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            parent.goTo(rule.target);
          });
        });
      });

      // Also rewrite socialRegister for registro
      if (currentScreen === 'registro') {
        var old = doc.querySelector('script');
        // Just override global function: create new script
        var s = doc.createElement('script');
        s.textContent = 'function socialRegister(p){ window.top.goTo("catalogo"); } function showManual(){} function hideManual(){}';
        doc.body.appendChild(s);
      }
    }

    function navBack() {
      if (navHistory.length > 1) {
        navHistory.pop();
        goTo(navHistory[navHistory.length - 1], false);
      }
    }

    function navNext() {
      var screen = SCREENS[currentScreen];
      if (screen && screen.next) goTo(screen.next);
    }

    function navHome() {
      navHistory.push('catalogo');
      goTo('catalogo');
    }

    window.goTo = goTo;
    window.onFrameLoad = onFrameLoad;
  </script>
</body>
</html>
