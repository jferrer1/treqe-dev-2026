<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>TREQE — Prototipo Navegable</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #1A1A1A; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

    .phone {
      width: 100%; max-width: 390px; height: 100vh;
      margin: 0 auto; background: #000; position: relative; overflow: hidden;
    }
    @media (min-width: 430px) {
      .phone { height: 844px; margin: 20px auto; border-radius: 44px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
      body { display: flex; align-items: center; justify-content: center; }
    }

    iframe { width: 100%; height: calc(100% - 50px); border: none; display: block; background: #F8F6F0; }

    /* Loading overlay */
    .loader {
      position: absolute; top: 0; left: 0; right: 0; bottom: 50px;
      display: flex; align-items: center; justify-content: center;
      background: #F8F6F0; z-index: 5; transition: opacity 0.3s;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }
    .loader .spinner { width: 32px; height: 32px; border: 3px solid #E8E4DC; border-top-color: #FF6A35; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Big clear navigation banner at the top */
    .nav-banner {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
      padding: 10px 12px 24px;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-banner button {
      font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600;
      padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .nav-banner button:active { transform: scale(0.93); }
    .nav-banner .btn-back {
      background: transparent; color: #FFF; padding: 8px 6px;
    }
    .nav-banner .btn-home {
      background: rgba(255,255,255,0.2); color: #FFF; padding: 8px 10px;
    }
    .nav-banner .btn-next {
      background: #FF6A35; color: #FFF; margin-left: auto;
      box-shadow: 0 2px 12px rgba(255,106,53,0.4);
    }
    .nav-banner .screen-label {
      font-size: 0.65rem; color: rgba(255,255,255,0.6); font-weight: 500;
      background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 12px;
    }
    .nav-banner .btn-back i { font-size: 1.1rem; }

    /* Bottom bar */
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
      background: #FFF; border-top: 1px solid #E8E4DC;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .bottom-bar span {
      font-size: 0.7rem; color: #B0B0B0;
    }

    @media (min-width: 430px) {
      .bottom-bar { border-radius: 0 0 44px 44px; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="loader" id="loader"><div class="spinner"></div></div>

    <!-- Navigation banner at top -->
    <div class="nav-banner" id="navBanner">
      <button class="btn-back" onclick="navBack()"><i class="fas fa-chevron-left"></i></button>
      <button class="btn-home" onclick="navHome()"><i class="fas fa-home"></i></button>
      <span class="screen-label" id="screenLabel">Splash</span>
      <button class="btn-next" id="btnNext" onclick="navNext()">Siguiente →</button>
    </div>

    <!-- Screen iframe -->
    <iframe id="screenFrame" src="../v9-splash/" onload="onFrameLoad()"></iframe>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <span>TREQE — Prototipo Navegable</span>
    </div>
  </div>

  <script>
    var SCREENS = {
      'splash':       { path: '../v9-splash/',           name: 'Splash',         next: 'onboarding', timer: 3500 },
      'onboarding':   { path: '../v5-onboarding/',        name: 'Onboarding',     next: 'registro',   timer: 0 },
      'registro':     { path: '../v10-registro/',         name: 'Registro',       next: 'catalogo',   timer: 0 },
      'catalogo':     { path: '../v1-catalogo/',          name: 'Catálogo',       next: 'detalle',    timer: 0 },
      'detalle':      { path: '../v2-detalle/',           name: 'Detalle',        next: 'match',      timer: 0 },
      'match':        { path: '../v6-match-notification/',name: 'Match!',         next: 'seguimiento',timer: 0 },
      'seguimiento':  { path: '../v7-seguimiento/',       name: 'Seguimiento',    next: 'catalogo',   timer: 0 },
      'subir':        { path: '../v3-subir/',             name: 'Subir',          next: 'catalogo',   timer: 0 },
      'perfil':       { path: '../v4-perfil/',            name: 'Mi perfil',      next: 'ajustes',    timer: 0 },
      'ajustes':      { path: '../v8-ajustes/',           name: 'Ajustes',        next: 'catalogo',   timer: 0 },
    };

    var currentScreen = 'splash';
    var frame = document.getElementById('screenFrame');
    var loader = document.getElementById('loader');
    var autoTimer = null;
    var navHistory = ['splash'];

    function goTo(screenId, addHist) {
      var screen = SCREENS[screenId];
      if (!screen) return;

      if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }

      currentScreen = screenId;
      if (addHist !== false) { navHistory.push(screenId); }

      loader.classList.remove('hidden');
      frame.src = screen.path;

      // Update banner
      document.getElementById('screenLabel').textContent = screen.name;
      var nextBtn = document.getElementById('btnNext');
      if (screen.next) {
        var nextName = SCREENS[screen.next] ? SCREENS[screen.next].name : screen.next;
        nextBtn.textContent = '→ ' + nextName;
        nextBtn.style.display = 'block';
      } else {
        nextBtn.style.display = 'none';
      }

      if (screen.timer > 0) {
        autoTimer = setTimeout(function() { goTo(screen.next); }, screen.timer);
      }
    }

    function onFrameLoad() {
      loader.classList.add('hidden');
    }

    function navBack() {
      if (navHistory.length > 1) {
        navHistory.pop();
        goTo(navHistory[navHistory.length - 1], false);
      }
    }

    function navNext() {
      var screen = SCREENS[currentScreen];
      if (screen && screen.next) goTo(screen.next);
    }

    function navHome() {
      navHistory.push('catalogo');
      goTo('catalogo');
    }

    window.goTo = goTo;
  </script>
</body>
</html>
