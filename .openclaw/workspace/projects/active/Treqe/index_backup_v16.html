<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treqe - Comunidad de Trueque</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Montserrat:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #FFFFFF;
      --overlay: rgba(0, 0, 0, 0.4);
      --search-bg: rgba(255, 255, 255, 0.2);
      --border-white: #FFFFFF;
      --radius-pill: 50px;
      --pad-header: 50px 100px;
      --gap-buttons: 20px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: 
        linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.4)),
        url('treqe-girl-skate-real.png') center/cover no-repeat;
      color: var(--white);
      position: relative;
    }
    /* Header */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: var(--pad-header);
      position: absolute;
      top: 0;
      width: 100%;
      z-index: 10;
    }
    .logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 3.2rem;
      color: var(--white);
      text-transform: lowercase;
      letter-spacing: -0.03em;
    }
    nav {
      display: flex;
      gap: 30px;
      justify-self: center;
    }
    nav a {
      color: var(--white);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.9;
      transition: opacity 0.3s;
    }
    nav a:hover { opacity: 1; }
    .search-bar {
      background: rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-pill);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      font-size: 0.85rem;
      color: var(--white);
      font-weight: 300;
      letter-spacing: 1px;
      text-transform: uppercase;
      justify-self: end;
      margin-right: 15px;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      justify-self: end;
    }
    .hamburger span {
      width: 25px;
      height: 2px;
      background: var(--white);
    }
    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      position: relative;
      z-index: 5;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 4rem;
      margin-bottom: 10px;
      font-weight: 400;
    }
    .hero-title strong {
      font-family: 'Montserrat', sans-serif;
      font-style: normal;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .cta-container {
      display: flex;
      gap: var(--gap-buttons);
      margin-top: 20px;
    }
    .cta-button {
      background: transparent;
      color: var(--white);
      border: 1px solid var(--border-white);
      border-radius: var(--radius-pill);
      padding: 16px 36px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: capitalize;
      letter-spacing: 0.5px;
    }
    .cta-button:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    /* Responsive */
    @media (max-width: 1024px) {
      header { padding: 30px 40px; }
      .hero-title { font-size: 3rem; }
      .hero-subtitle { font-size: 1.5rem; }
    }
    @media (max-width: 768px) {
      header { padding: 20px 25px; }
      nav { display: none; }
      .search-bar { display: none; }
      .hamburger { display: flex; }
      .hero-title { font-size: 2.5rem; }
      .hero-subtitle { font-size: 1.2rem; margin-bottom: 40px; }
      .cta-container { flex-direction: column; width: 100%; max-width: 300px; }
      .cta-button { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">treqe</div>
    <nav>
      <a href="#">COMO FUNCIONA</a>
      <a href="#">UNETE</a>
      <a href="#">TREQEALO</a>
    </nav>
    <div style="display: flex; align-items: center; justify-self: end;">
      <div class="search-bar">BUSCAR</div>
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>
  <main class="hero">
    <h1 class="hero-title">Bienvenido <strong>A LA COMUNIDAD DE TRUEQUE,</strong> sin dinero.</h1>
    <div class="cta-container">
      <button class="cta-button">Treqear</button>
      <button class="cta-button">Buscar</button>
    </div>
  </main>
</body>
</html>
