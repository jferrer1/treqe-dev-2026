[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "https://treqe.es/*"
  to = "https://www.treqe.es/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://treqe.es/*"
  to = "https://www.treqe.es/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"